name: Cittadinanza Bot Checks

# Control the execution frequency
on:
  schedule:
    # Runs every 8 hours
    - cron: '0 */8 * * *'
  # Allow manual triggering via the web interface
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit bot.db back back to the repo!

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run cittadinanza-bot
        # Map GitHub Secrets directly to environment variables parsed by our app
        env:
          EMAIL_ENABLED: "true"
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          # TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          # TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          go run main.go

      - name: Commit state changes
        # Safely commit bot.db so the next run knows what articles we already sent
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add bot.db
          
          # Only commit and push if bot.db actually has differences
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "chore: persist new articles in bot.db"
            
            # Try pushing. If it fails, pull & rebase, resolving any binary conflict on bot.db automatically.
            if ! git push; then
              echo "Push failed. Attempting to pull and rebase..."
              if ! git pull --rebase origin main; then
                echo "Conflict detected during rebase. Resolving conflict on bot.db by keeping the local version..."
                git checkout --theirs -- bot.db
                git add bot.db
                git rebase --continue
              fi
              echo "Pushing after rebase..."
              git push
            fi
          fi
